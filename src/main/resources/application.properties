spring.application.name=online-auction-system

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:auction_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# JWT Configuration — set JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# CORS — comma-separated list of allowed origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:5173}

# Server Port
server.port=8080
